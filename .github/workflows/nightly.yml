name: nightly

# Full test suite — the heavy integration tests (real-repo git / co-change /
# snapshot analysis in cmd/go-code and internal/{compare,federate,embeddings})
# that the per-PR `preflight` gate skips via `go test -short`. They run IN FULL
# here every night, so the -short split in preflight is a cadence change, NOT
# skip-to-green: nothing is dropped, just moved off the hot PR path.
#
# Runs on GitHub-hosted `ubuntu-24.04-arm` (free for public repos, arm64
# parity with prod) with the same vendored postgres+age image as
# preflight.yml — see that file for the image/readiness/random-port
# rationale. Moved off the host-a self-hosted runner 2026-07-14.

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC ≈ 03:00-04:00 America/Los_Angeles (off-peak)
  workflow_dispatch: {}    # manual trigger (e.g. right after merging this)

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-test:
    runs-on: ubuntu-24.04-arm
    # Full suite was ~26m warm on a 4-core ARM box; hosted runners restore Go
    # caches over the network and may build the postgres image cold, so give
    # generous headroom without letting a real hang run for 6h.
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v5
        with:
          # Full history so compare.CollectChurn sees real per-file churn — the
          # hotspot arm in TestSignalHitsLiveIntegration needs it (shallow
          # depth-1 clone would yield empty churn and fail the assertion).
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          # Latest patched toolchain, not go.mod's pin — see preflight.yml.
          go-version: stable

      - uses: docker/setup-buildx-action@v3

      - name: Build postgres+age image (GHA-cached)
        uses: docker/build-push-action@v6
        with:
          context: .github/ci/postgres-age
          tags: ci-postgres-age:17
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start ephemeral postgres+age
        id: pg
        run: |
          set -euo pipefail
          if ! command -v pg_isready >/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi

          name="gocode-nightly-pg-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "container=$name" >> "$GITHUB_OUTPUT"
          docker run -d --rm --name "$name" \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=gocode_test \
            --shm-size=512mb \
            -p 127.0.0.1::5432 \
            ci-postgres-age:17 \
            postgres -c shared_preload_libraries=age,pg_stat_statements

          port=$(docker inspect -f '{{ (index (index .NetworkSettings.Ports "5432/tcp") 0).HostPort }}' "$name")
          echo "port=$port" >> "$GITHUB_OUTPUT"

          # Poll the mapped host port, not `docker exec pg_isready` — the
          # entrypoint's transient first startup false-positives the latter
          # (see preflight.yml).
          ready=0
          for i in $(seq 1 60); do
            if pg_isready -h 127.0.0.1 -p "$port" -U postgres >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::postgres did not become ready in time"
            docker logs "$name" || true
            exit 1
          fi

      - name: Bootstrap extensions
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          psql -h 127.0.0.1 -p "${{ steps.pg.outputs.port }}" -U postgres -d gocode_test \
            -v ON_ERROR_STOP=1 \
            -c 'CREATE EXTENSION IF NOT EXISTS vector;' \
            -c 'CREATE EXTENSION IF NOT EXISTS age;' \
            -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;'

      - name: make test (full suite, no -short)
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ steps.pg.outputs.port }}/gocode_test?sslmode=disable
          PR_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ steps.pg.outputs.port }}/gocode_test?sslmode=disable
        run: make test

      - name: Stop ephemeral postgres+age
        if: always()
        run: docker rm -f "${{ steps.pg.outputs.container }}" >/dev/null 2>&1 || true
