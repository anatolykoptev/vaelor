name: nightly

# Full test suite — the heavy integration tests (real-repo git / co-change /
# snapshot analysis in cmd/go-code and internal/{compare,federate,embeddings})
# that the per-PR `preflight` gate skips via `go test -short`. They run IN FULL
# here every night, so the -short split in preflight is a cadence change, NOT
# skip-to-green: nothing is dropped, just moved off the hot PR path.
#
# Same self-hosted host-a runner + same ephemeral deploy-postgres-age:17 setup
# as preflight.yml (see that file for the postgres-readiness / random-host-port
# rationale). Runs off-peak on the shared 4-core prod box.

on:
  schedule:
    - cron: "0 11 * * *"   # 11:00 UTC ≈ 03:00-04:00 America/Los_Angeles (off-peak)
  workflow_dispatch: {}    # manual trigger (e.g. right after merging this)

concurrency:
  group: nightly-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  full-test:
    runs-on: [self-hosted, host-a]
    # Full suite is ~26m warm; 50m covers an occasional cold GOCACHE (e.g. after
    # a Go toolchain bump) without parking the repo's only runner indefinitely.
    timeout-minutes: 50

    steps:
      - uses: actions/checkout@v5

      - name: Reap stale CI postgres containers
        run: |
          set -euo pipefail
          docker ps -aq --filter "name=gocode-nightly-pg-" | xargs -r docker rm -f

      - name: Start ephemeral postgres+age
        id: pg
        run: |
          set -euo pipefail
          name="gocode-nightly-pg-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "container=$name" >> "$GITHUB_OUTPUT"
          docker run -d --rm --name "$name" \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=gocode_test \
            --shm-size=512mb \
            -p 127.0.0.1::5432 \
            deploy-postgres-age:17 \
            postgres -c shared_preload_libraries=age,pg_stat_statements

          port=$(docker inspect -f '{{ (index (index .NetworkSettings.Ports "5432/tcp") 0).HostPort }}' "$name")
          echo "port=$port" >> "$GITHUB_OUTPUT"

          ready=0
          for i in $(seq 1 60); do
            if pg_isready -h 127.0.0.1 -p "$port" -U postgres >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::postgres did not become ready in time"
            docker logs "$name" || true
            exit 1
          fi

      - name: Bootstrap extensions
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          psql -h 127.0.0.1 -p "${{ steps.pg.outputs.port }}" -U postgres -d gocode_test \
            -v ON_ERROR_STOP=1 \
            -c 'CREATE EXTENSION IF NOT EXISTS vector;' \
            -c 'CREATE EXTENSION IF NOT EXISTS age;' \
            -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;'

      - name: make test (full suite, no -short)
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ steps.pg.outputs.port }}/gocode_test?sslmode=disable
          PR_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ steps.pg.outputs.port }}/gocode_test?sslmode=disable
        run: make test

      - name: Stop ephemeral postgres+age
        if: always()
        run: docker rm -f "${{ steps.pg.outputs.container }}" >/dev/null 2>&1 || true
