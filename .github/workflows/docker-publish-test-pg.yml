name: Publish test-pg Image

# Builds and pushes the composite test-pg image (pgvector + Apache AGE +
# hypopg) to GHCR. This image is used by preflight.yml as a prebuilt
# alternative to building .github/ci/postgres-age/Dockerfile on every run.
#
# Trigger: manual only (workflow_dispatch). The image changes rarely (only
# when AGE_VERSION or the base pgvector image bumps), so automatic builds
# would waste CI minutes. Run from the Actions tab when a bump is needed.
#
# Mirrors the memdb docker-publish.yml pattern but for the test-pg composite
# image rather than the Go service image.

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-test-pg

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=pg17-age1.7.0
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=Vaelor Test PG
            org.opencontainers.image.description=PostgreSQL 17 + pgvector + Apache AGE 1.7.0-rc0 + hypopg — composite CI test image for vaelor
            org.opencontainers.image.licenses=MIT

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.test-pg
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
