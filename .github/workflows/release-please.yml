name: release-please

# Conventional-commit-driven versioning ONLY (tag + GitHub release + changelog).
# This job is lightweight and stays on GitHub-hosted runners (free tier).
#
# Binaries are NOT built here: GoReleaser cross-compile + docker builds are heavy
# and would consume PAID GitHub Actions minutes (operator rule: never use paid
# GHA). The release binaries are built + uploaded LOCALLY on the krolik box by
# ~/bin/goreleaser-release-local.sh (a systemd timer that detects a new
# release-please tag whose GitHub release has no binary assets and runs
# `goreleaser release` on the box). Do NOT add a goreleaser job back here.
on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          target-branch: main
          config-file: .release-please-config.json
          manifest-file: .release-please-manifest.json
