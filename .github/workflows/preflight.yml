name: preflight

# Pre-merge build/test gate. Runs on GitHub-hosted `ubuntu-24.04-arm` — free
# unlimited minutes for public repos, and arm64 matches the ARM prod boxes
# this code deploys to. Moved off the krolik self-hosted runner 2026-07-14:
# a public repo's CI on a prod box is a fork-PR exposure by construction,
# and CI contended with prod services for the box's 4 cores. GitHub-hosted
# runners sandbox every job in a throwaway VM, so the old same-repo fork
# guard is intentionally gone — external PRs may now run CI (first-time
# contributors still need maintainer approval per GitHub's default).
#
# go-code persists three independent pgvector stores (internal/embeddings,
# internal/designmd, internal/learnings) plus an Apache AGE property graph
# (internal/codegraph) behind DATABASE_URL (embeddings tests also read the
# separately-named PR_TEST_DATABASE_URL, a deliberate guard added after PR
# #251 flipped table ownership on the prod DB — see internal/embeddings/
# store_test.go). Every DB-gated test t.Skip's cleanly when its var is unset.
#
# The job builds the SAME image shape prod runs — PostgreSQL 17 + pgvector +
# Apache AGE, vendored at .github/ci/postgres-age/Dockerfile (mirror of
# krolik-server/postgres-age/Dockerfile) — through a buildx GHA cache, so the
# AGE source compile only happens on a cache miss (~5 min cold, seconds warm).
# It is started with the same `-c shared_preload_libraries=age,pg_stat_statements`
# flag prod uses — AGE requires server-side preload for its operators/types,
# verified by codegraph.CheckAGEPreloaded at prod startup.
#
# Each store bootstraps its OWN tables on first use (EnsureSchema/EnsureGraph),
# but deliberately does NOT create the `vector` / `age` / `pg_trgm` extensions
# themselves — prod's database has carried those since it was first
# provisioned. A brand-new ephemeral DB has none of that history, so this job
# creates all three once, up front.
#
# The container still publishes 5432 to a RANDOM free host port on loopback
# (`-p 127.0.0.1::5432`, read back via docker inspect). The VM is ours alone
# now, but the pattern is collision-proof by construction and keeps this file
# and nightly.yml identical in shape.

on:
  pull_request:

concurrency:
  group: preflight-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  preflight:
    runs-on: ubuntu-24.04-arm
    # Gate is ~2m of tests; headroom covers a cold buildx cache (AGE compile)
    # plus a cold Go module cache without letting a real hang run for
    # GitHub's 6h default.
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v5
        with:
          # Fleet policy: CI runs the latest patched toolchain (go.mod is the
          # minimum, not the pin). govulncheck below gates on stdlib CVEs that
          # are fixed in patch releases — pinning go.mod's version fails the
          # gate the day a stdlib CVE lands (seen live: GO-2026-4970/5856,
          # fixed in go1.26.5 while go.mod pinned 1.26.4).
          go-version: stable

      - uses: docker/setup-buildx-action@v3

      - name: Build postgres+age image (GHA-cached)
        uses: docker/build-push-action@v6
        with:
          context: .github/ci/postgres-age
          tags: ci-postgres-age:17
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start ephemeral postgres+age
        id: pg
        run: |
          set -euo pipefail
          # Unlike the x64 ubuntu images, ubuntu-24.04-arm ships NO postgres
          # client — this install is load-bearing on every run, not a rare
          # safety net (runner-images Ubuntu2404-Arm64 readme: MySQL only).
          if ! command -v pg_isready >/dev/null; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          fi

          name="gocode-ci-pg-${{ github.run_id }}-${{ github.run_attempt }}"
          echo "container=$name" >> "$GITHUB_OUTPUT"
          docker run -d --rm --name "$name" \
            -e POSTGRES_USER=postgres \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=gocode_test \
            --shm-size=512mb \
            -p 127.0.0.1::5432 \
            ci-postgres-age:17 \
            postgres -c shared_preload_libraries=age,pg_stat_statements

          port=$(docker inspect -f '{{ (index (index .NetworkSettings.Ports "5432/tcp") 0).HostPort }}' "$name")
          echo "port=$port" >> "$GITHUB_OUTPUT"

          # The postgres entrypoint does an ephemeral FIRST startup (initdb +
          # unix-socket only) then restarts for the real listener on TCP :5432
          # — `docker exec ... pg_isready` false-positives during that
          # transient first startup (verified empirically). Poll over the
          # MAPPED HOST PORT instead — the same path `make preflight` below
          # actually connects through — so we only proceed once the stable,
          # TCP-reachable instance is up.
          ready=0
          for i in $(seq 1 60); do
            if pg_isready -h 127.0.0.1 -p "$port" -U postgres >/dev/null 2>&1; then
              ready=1
              break
            fi
            sleep 1
          done
          if [ "$ready" -ne 1 ]; then
            echo "::error::postgres did not become ready in time"
            docker logs "$name" || true
            exit 1
          fi

      - name: Bootstrap extensions
        env:
          PGPASSWORD: postgres
        run: |
          set -euo pipefail
          psql -h 127.0.0.1 -p "${{ steps.pg.outputs.port }}" -U postgres -d gocode_test \
            -v ON_ERROR_STOP=1 \
            -c 'CREATE EXTENSION IF NOT EXISTS vector;' \
            -c 'CREATE EXTENSION IF NOT EXISTS age;' \
            -c 'CREATE EXTENSION IF NOT EXISTS pg_trgm;'

      # make preflight runs gofmt + vet + build + test-short + govulncheck
      # (govulncheck self-installs via the Makefile).
      - name: make preflight
        env:
          DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ steps.pg.outputs.port }}/gocode_test?sslmode=disable
          PR_TEST_DATABASE_URL: postgres://postgres:postgres@127.0.0.1:${{ steps.pg.outputs.port }}/gocode_test?sslmode=disable
        run: make preflight

      - name: Stop ephemeral postgres+age
        if: always()
        run: docker rm -f "${{ steps.pg.outputs.container }}" >/dev/null 2>&1 || true
