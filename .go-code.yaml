version: 1
# Repo-local overrides for go-code itself.
# Team defaults live in policies/defaults.yaml and are merged in automatically
# via GOCODE_DEFAULT_POLICY env var.

rules:
  forbidden_imports:
    - pattern: "github.com/smacker/go-tree-sitter/bash"
      reason: "bash parser not used in go-code; avoid accidental CGO bloat"
  required_when_touching:
    - path: "cmd/go-code/tool_*.go"
      must_also_touch: "*_test.go"
      reason: "new MCP tool must ship with tests"
    - path: "internal/forge/**"
      must_also_touch: "*_test.go"
      reason: "forge is the external write-path; regressions here post wrong data to GitHub"
    - path: "internal/learnings/**"
      must_also_touch: "*_test.go"
      reason: "DB-touching code needs coverage"
